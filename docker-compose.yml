version: "3.9"

services:
  executor-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: executor-service:v1.0.0
    ports:
      - "5000:5000"  # Main service
    environment:
      FLASK_PORT: "5000"
      CONTAINER_EXECUTOR_URL: "http://executor-executor:5001"
      CONTAINER_IDLE_TIMEOUT: ${CONTAINER_IDLE_TIMEOUT:-600}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AGENT_MODEL: ${AGENT_MODEL}
      AGENT_TEMPERATURE: ${AGENT_TEMPERATURE:-0.7}
      AGENT_MAX_TOKENS: ${AGENT_MAX_TOKENS:-4096}
    volumes:
      - /storage:/storage:ro  # Input files
      - executor-work:/tmp/work
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - executor-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  executor-executor:  # In-container executor sidecar
    image: executor-service:v1.0.0
    command: python -m src.executor_server
    ports:
      - "5001:5001"
    environment:
      FLASK_PORT: "5001"
      WORKDIR_BASE: /tmp/work
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - executor-work:/tmp/work
    networks:
      - executor-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  executor-work:
    driver: local

networks:
  executor-net:
    driver: bridge
