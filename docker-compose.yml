version: "3.9"

# Cross-process file sharing contract:
#   WazzapAgents (the parent bridge) and this stack must share a directory
#   on the host so that:
#     - input_files paths passed to /execute resolve inside the container
#     - output_files paths returned from /execute resolve on the host that
#       runs WazzapAgents (so the bridge can stage them as WhatsApp media)
#   The default is /storage on the host. Override via SUBAGENT_STORAGE_DIR
#   if you need a different host path.
#
# WORKDIR_BASE must therefore live inside the shared mount; both the main
# service and the in-container executor must agree on the same value, and
# WazzapAgents must be able to read that path.
#
# Secrets convention:
#   - .env holds system config AND LLM_API_KEY. Docker Compose also reads
#     it for ${VAR} substitution in this file, but via env_file it is only
#     loaded into the main service (which runs the LLM agent loop).
#   - .env.secrets (git-ignored) holds skill-specific API keys
#     (BRAVE_SEARCH_API_KEY, etc.). It is also only loaded into the main
#     service via env_file.
#   - The sidecar (which executes bash/python/js commands on behalf of the
#     LLM) receives ONLY the keys it needs as explicit env vars — never the
#     env_file entries. This prevents the LLM from accessing LLM_API_KEY
#     inside a bash shell.

services:
  executor-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: executor-service:v1.0.0
    ports:
      - "5000:5000" # Main service
    env_file:
      - .env # System config + LLM_API_KEY
      - .env.secrets # API keys (BRAVE_SEARCH_API_KEY, etc.)
    environment:
      # Compose-specific overrides — take precedence over env_file entries.
      FLASK_PORT: "5000"
      CONTAINER_EXECUTOR_URL: "http://executor-executor:5001"
      SESSION_IDLE_TIMEOUT: ${SESSION_IDLE_TIMEOUT:-600}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Sessions store their workdir under WORKDIR_BASE. Keep this in sync
      # with the executor-executor sidecar so bash/python tool output lands
      # in the same place we collect output_files from.
      WORKDIR_BASE: ${WORKDIR_BASE:-/storage/subagent_work}
    volumes:
      # Shared exchange directory: read-write so the bridge can stage
      # input_files here and the agent can write output_files here.
      - ${SUBAGENT_STORAGE_DIR:-/storage}:/storage:rw
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      # Lets the agent POST progress/complete callbacks back to the bridge
      # running on the host (default SUBAGENT_WEBHOOK_URL points at
      # host.docker.internal:8081). On Linux Docker this resolves the
      # gateway IP; on Docker Desktop it is built-in.
      - "host.docker.internal:host-gateway"
    networks:
      - executor-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  executor-executor: # In-container executor sidecar
    image: executor-service:v1.0.0
    command: python -m src.executor_server
    ports:
      - "5001:5001"
    environment:
      FLASK_PORT: "5001"
      WORKDIR_BASE: ${WORKDIR_BASE:-/storage/subagent_work}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # ONLY skill-specific API keys — never inject LLM_API_KEY here,
      # because this container runs arbitrary bash/python/js commands
      # generated by the LLM, which could echo or log env vars.
      # (LLM_API_KEY lives in .env, which is not loaded by this service.)
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
    volumes:
      # Same shared mount as the main service so bash/python tools can
      # read input_files staged by the bridge AND write outputs to a
      # path the bridge can read after the task completes.
      - ${SUBAGENT_STORAGE_DIR:-/storage}:/storage:rw
      - ./skills:/skills:ro # ← read-only skills
    networks:
      - executor-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  executor-net:
    driver: bridge
